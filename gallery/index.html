<body class="page-gallery page-wrapper">

  <header class="site-header">
    <div class="container">
    <!-- Logo: replace /images/logo.png with your actual logo file -->
    <a href="/" class="site-logo" aria-label="Rose — Artist Site, home">
      <img
        src="/assets/logo.png"
        alt="Rose — Artist Site"

    <nav class="site-nav" aria-label="Primary navigation">
      <ul class="nav-list">
        <li><a href="/" class="nav-link">Home</a></li>

        <li><a href="/letters/" class="nav-link">Read My Letters</a></li>

          <a

          >Shop ↗</a>

      </ul>
    </nav>
    </div>

  <main class="site-main" id="main-content">
    <div class="container">

      <header class="gallery-header">
        <p class="section-label">Work</p>
        <h1 class="page-title">Gallery</h1>
      </header>

      <!-- Image grid: add or remove <article> blocks as needed.
           Each image links to an external URL and opens in a new tab.
           Follow filename conventions: descriptive-kebab-case.jpg
           See image-block-snippet.html for copy-paste block. -->
      <section aria-label="Gallery images">
        <ul class="image-grid image-grid--gallery">

          <!-- [IMAGE BLOCK — copy pattern below for each artwork] -->

          <li>
  <figure class="image-block">
    <a
      href="#"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="View Tiles, ink, 2026 (opens in new tab)"
    >
      <img
        src="/gallery/images/finishedtiles.jpg"
        alt="Ink drawings of public domain images"
        width="800"
        height="1000"
        loading="lazy"
      >
    </a>
    <figcaption>Tiles, ink, 2026</figcaption>
  </figure>
</li>

          <li>
            <figure class="image-block">
              <a
                href="#"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="View [artwork title] (opens in new tab)"
              >
                <img
                  src="/gallery/images/artwork-title-medium-year-02.jpg"
                  alt="[Descriptive alt text: medium, subject, year]"
                  width="800"
                  height="1000"
                  loading="lazy"
                >
              </a>
              <figcaption>[Artwork Title], [Medium], [Year]</figcaption>
            </figure>
          </li>

          <li>
            <figure class="image-block">
              <a
                href="#"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="View [artwork title] (opens in new tab)"
              >
                <img
                  src="/gallery/images/artwork-title-medium-year-03.jpg"
                  alt="[Descriptive alt text: medium, subject, year]"
                  width="800"
                  height="1000"
                  loading="lazy"
                >
              </a>
              <figcaption>[Artwork Title], [Medium], [Year]</figcaption>
            </figure>
          </li>

          <!-- Add more <li> / <figure> blocks here following the same pattern -->

        </ul>
      </section>

    </div>
